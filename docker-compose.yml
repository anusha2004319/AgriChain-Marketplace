version: '3.8'

services:
  # 1. The Database
  mongodb:
    image: mongo:latest
    container_name: agrichain_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # 2. The Backend API
  backend:
    build: ./backend
    container_name: agrichain_backend
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    environment:
      - MONGO_URL=mongodb://mongodb:27017/ # Connects using Docker's internal network

  # 3. The Frontend App
  frontend:
    build: ./frontend
    container_name: agrichain_frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend

volumes:
  mongo_data: